# Security review: this workflow uses no untrusted inputs (no github.event.issue.*,
# pull_request.*body/title, head_commit.message, etc.). All ${{ ... }} expansions
# are static (github.workflow, github.ref, matrix.php) and safe.
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4']
    steps:
      - uses: actions/checkout@v4

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        uses: ramsey/composer-install@v3
        with:
          composer-options: '--no-interaction --no-progress --prefer-dist'

      - name: Run unit tests
        run: vendor/bin/phpunit --testsuite unit
